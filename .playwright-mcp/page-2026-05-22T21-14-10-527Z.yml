  - main [ref=e17]:
    - generic [ref=e19]:
      - generic [ref=e20]: Fachgebiet · Familienrecht
      - heading "Familienrecht · für alle Lebensphasen." [level=1] [ref=e22]:
        - text: Familienrecht · für alle
        - emphasis [ref=e23]: Lebensphasen
        - text: .
      - paragraph [ref=e24]: Wir beraten in allen Fragen des Familien- und Erbrechts · von Eheverträgen und Vermögensplanung über Unterhalt und Sorgerecht bis zur Nachfolgeregelung.
      - generic [ref=e25]:
        - paragraph [ref=e26]: "Familienrecht ist mehr als Trennung. Es ordnet eine ganze Reihe von Lebensbereichen, in denen Recht und persönliche Beziehungen aufeinandertreffen: Heirat und Ehevertrag, Unterhalt und Sorgerecht, Vorsorgevollmacht und Patientenverfügung, Adoption und Abstammung, Nachfolge und Erbe. Vieles davon lässt sich gestalten, bevor ein Konflikt überhaupt entsteht · und genau dort fängt gute Beratung an."
        - paragraph [ref=e27]: "Wir verstehen Familienrecht daher als langfristige Begleitung. Manche Mandate sind reine Vorsorge: ein Ehevertrag vor der Hochzeit, ein Testament für die nächste Generation, eine Vollmacht für den Notfall. Andere kommen aus akuten Anlässen · Trennung, Erbauseinandersetzung, Sorgerechtskonflikt. In beiden Fällen ist unser Ziel dasselbe: eine Lösung, die zur jeweiligen Familienstruktur passt und über den Tag hinaus trägt."
    - note [ref=e30]:
      - generic [ref=e31]: Diskretion
      - paragraph [ref=e32]: Familienrechtliche Mandate sind sensibel · auch innerhalb der Familie, im Bekanntenkreis und im beruflichen Umfeld. Wir behandeln jedes Gespräch streng vertraulich. Termine außerhalb der regulären Bürozeiten sind möglich, wenn die Situation es erfordert.
    - generic [ref=e34]:
      - generic [ref=e35]:
        - generic [ref=e36]: Drei Beratungsfelder
        - heading "Gestalten, klären, weitergeben." [level=2] [ref=e38]:
          - text: Gestalten, klären,
          - emphasis [ref=e39]: weitergeben
          - text: .
      - generic [ref=e40]:
        - article [ref=e41]:
          - generic: "01"
          - generic [ref=e42]: Vorsorge & Vermögensgestaltung
          - heading "Bevor der Ernstfall kommt" [level=3] [ref=e43]:
            - text: Bevor der
            - emphasis [ref=e44]: Ernstfall
            - text: kommt
          - paragraph [ref=e45]: Eheverträge, eingetragene Partnerschaften, Schenkungsverträge, Vorsorgevollmachten und Patientenverfügungen. Wir gestalten die rechtlichen Rahmen vor, in denen Familie und Vermögen verlässlich funktionieren · bevor eine Krankheit, ein Streit oder ein Todesfall die Lage verändert.
        - article [ref=e46]:
          - generic: "02"
          - generic [ref=e47]: Kinder, Unterhalt & Sorge
          - heading "Was die Familie regeln muss" [level=3] [ref=e48]:
            - text: Was die
            - emphasis [ref=e49]: Familie
            - text: regeln muss
          - paragraph [ref=e50]: Sorge- und Umgangsrechtsregelungen für getrennt lebende Eltern, Unterhaltsberechnungen nach Düsseldorfer Tabelle, Vaterschaftsanerkennung, Namensrecht der Kinder, Adoption. Auch außerhalb einer Trennung gibt es viele familienrechtliche Fragen, die geklärt werden wollen.
        - article [ref=e51]:
          - generic: "03"
          - generic [ref=e52]: Erbrecht & Nachfolge
          - heading "Vermögen weitergeben" [level=3] [ref=e53]:
            - text: Vermögen
            - emphasis [ref=e54]: weitergeben
          - paragraph [ref=e55]: Testaments- und Erbvertragsgestaltung, Pflichtteilsfragen, Auseinandersetzung von Erbengemeinschaften und Verteidigung gegen Pflichtteilsansprüche. Wir beraten auch bei vorweggenommener Erbfolge · etwa wenn ein Familienunternehmen, eine Immobilie oder Wertpapiere noch zu Lebzeiten übertragen werden sollen.
    - generic [ref=e57]:
      - generic [ref=e58]:
        - generic [ref=e59]: 04 · Familienrecht und Vermögen
        - heading "Wo Familie und Vermögen aufeinandertreffen." [level=2] [ref=e60]:
          - text: Wo Familie und
          - emphasis [ref=e61]: Vermögen
          - text: aufeinandertreffen.
        - paragraph [ref=e62]: Familienrecht ist oft auch Vermögensrecht · beim Ehevertrag genauso wie bei der Schenkung an die Kinder, bei der Erbauseinandersetzung oder bei der Übertragung eines Familienunternehmens. Wer hier ohne Beratung agiert, riskiert, dass eine gut gemeinte Entscheidung Jahrzehnte später teuer wird.
        - generic [ref=e63]:
          - paragraph [ref=e64]: "Wir verbinden familienrechtliche Beratung deshalb mit dem wirtschaftlichen Blick aus unserer Steuerrechts-Expertise: Wie wirkt sich ein Ehevertrag auf die Erbschaftsteuer aus? Welche Schenkungsfreibeträge lassen sich über zehn Jahre optimal nutzen? Wie sichert man ein Familienunternehmen für die nächste Generation, ohne den Pflichtteil zu verletzen? Wir denken die Folgen mit, statt erst hinterher zu reagieren."
          - paragraph [ref=e65]: Gerade bei Unternehmern und vermögenden Mandanten zählt dieser kombinierte Blick. Wir koordinieren mit Steuerberater, Notar und ggf. Sachverständigen, damit am Ende eine Lösung steht, die nicht nur juristisch sauber, sondern auch wirtschaftlich tragfähig ist · über Generationen.
      - complementary [ref=e66]:
        - generic [ref=e67]: Häufige Fragen aus dem Erstgespräch
        - heading "Was Mandanten meist fragen" [level=4] [ref=e68]
        - separator [ref=e69]
        - list [ref=e70]:
          - listitem [ref=e71]: Brauchen wir wirklich einen Ehevertrag?
          - listitem [ref=e72]: Was regelt eine Vorsorgevollmacht genau?
          - listitem [ref=e73]: Wie viel Kindesunterhalt ist angemessen?
          - listitem [ref=e74]: Wie übertrage ich eine Immobilie zu Lebzeiten?
          - listitem [ref=e75]: Was ist beim Pflichtteil zu beachten?
          - listitem [ref=e76]: Wie funktioniert eine Erbauseinandersetzung?
    - generic [ref=e78]:
      - generic [ref=e79]: 05 · Gestaltung statt Streit
      - paragraph [ref=e80]:
        - text: “ Das meiste Familienrecht passiert
        - emphasis [ref=e81]: bevor
        - text: es ein Problem gibt. ”
      - generic [ref=e82]:
        - paragraph [ref=e83]: "Ein Ehevertrag schreibt nicht das Ende vor · er klärt nur Fragen, die ohnehin irgendwann beantwortet werden müssen. Ein Testament regelt nicht den Streit unter den Erben · es verhindert ihn. Vieles im Familienrecht ist Gestaltung: heute klar formulieren, was später nicht mehr verhandelbar wäre."
        - paragraph [ref=e84]: "Wo Konflikte trotzdem entstehen, ist unsere Linie konstant: zuerst die einvernehmliche Lösung. Wo nötig, vor dem Familien- oder Nachlassgericht · in Heilbronn, Siegen oder dem zuständigen Gericht. Ohne unnötige Schärfe, aber mit klarer Linie."
      - paragraph [ref=e85]: Gestaltung · Beratung · Vertretung
